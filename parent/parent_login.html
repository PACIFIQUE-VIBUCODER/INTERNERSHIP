<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARENT_login portal</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-image:url(./shelby-murphy-figueroa-Psv8aHU9HN0-unsplash.jpg);
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contain{
            background-color: rgba(26, 0, 51, 0.9);
            border-radius: 20px;
            width: 95%;
            max-width: 1000px;
            padding: 20px;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .display{
            width: 100%;
            background-color: rgb(2, 49, 49);
            display: flex;
            flex-wrap: wrap; /* Ibi nibyo bituma kuri telefone byikubita munsi y'ibindi */
            border-radius: 20px;
            overflow: hidden;
            filter: drop-shadow(0 0 10px rgb(108, 108, 56));
            animation: show 1.5s ease-out;
        }

        @keyframes show{
            0%{transform: scale(0.8); opacity: 0;}
            100%{transform: scale(1); opacity: 1;}
        }

        aside{
            background-color: #010a13;
            width: 40%;
            padding: 40px;
            color: azure;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Clip-path twayigumisha kuri mudasobwa gusa */
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
        }

        .info{
            background: linear-gradient(45deg,#03303a,rgb(11, 53, 53),#0077b6);
            width: 60%;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .welcome{
            font-size: 2rem;
            margin-bottom: 10px;
            animation: clip 5s infinite;
        }

        @keyframes clip{
            0%, 100%{transform: rotateY(0deg);}
            50%{transform:rotateY(30deg)}
        }

        .log{
            color: rgb(255, 187, 2);
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            width: 100%;
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: wheat;
            font-size: 0.9rem;
        }

        input{
            width: 100%;
            height: 45px;
            background-color: #1ab0cf;
            border: none;
            border-radius: 10px;
            padding: 0 40px 0 15px;
            font-size: 1rem;
            color: rgb(1, 57, 1);
            outline: none;
        }

        .input-group i{
            position: absolute;
            right: 15px;
            top: 35px;
            color: #013901;
        }

        button{
            background-color: #00B4D8;
            width: 200px;
            height: 50px;
            border-radius: 15px;
            border: 2px solid #ccc;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover{
            background-color:rgb(30, 210, 117);
            color: white;
            transform: scale(1.05);
        }

        .footer-text{
            color: yellow;
            margin-top: 15px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .back {
            margin-top: 20px;
            text-decoration: none;
        }

        /* --- IYI NIYO MEDIA QUERY KURI TELEFONE --- */
        @media (max-width: 768px) {
            .display {
                flex-direction: column;
            }

            aside, .info {
                width: 100%;
                clip-path: none; /* Turakuraho clip-path ngo bitanyura mu magambo */
                padding: 30px 15px;
            }

            aside {
                min-height: 200px;
            }

            .welcome {
                font-size: 1.5rem;
            }

            input {
                width: 100%; /* Iba 100% y'umwanya ihari */
            }
        }
    </style>
</head>
<body>
    
<section class="contain">
    <div class="display">
        <aside>
            <h3 class="welcome">WELCOME <br> BACK!</h3>
            <p>We hope you and your family have a nice day.</p>
        </aside>

        <div class="info">
            <h3 class="log">PARENT LOGIN PORTAL</h3>
            <p style="font-size: 0.8rem; margin-bottom: 20px;">Fill this field then continue to access other resources</p>

            <form>
                <div class="input-group">
                    <label>Parent/Guardian Name:</label>
                    <input type="text" placeholder="Enter your name">
                    <i class="fas fa-user"></i>
                </div>

                <div class="input-group">
                    <label>Parent Phone:</label>
                    <input type="text" placeholder="Enter your phone">
                    <i class="fas fa-phone"></i>
                </div>

                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" placeholder="Enter your password">
                    <i class="fas fa-lock"></i>
                </div>

                <button type="submit">SIGN IN</button>
                <p class="footer-text">Forgot password? I don't have an account</p>
            </form>
        </div>
    </div>
    <a href="../index.html" class="back" style="color: aliceblue;">Back to Home</a>
</section>

</body>
</html>
