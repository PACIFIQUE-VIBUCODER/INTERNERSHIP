<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Management System</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Bituma padding idasohora imashini hanze */
        }

        body, html {
            height: 100%;
            background-color: rgb(38, 53, 53);
            font-family: sans-serif;
        }

        section {
            display: flex;
            flex-direction: row;
            min-height: 100vh;
        }

        aside {
            background-image: url('./calss.jpg');
            background-size: cover;
            background-position: center;
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .favour {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 4vh;
            font-weight: bold;
        }

        .contain {
            width: 50%;
            background-color: rgb(38, 53, 53);
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;    
            color: antiquewhite;
            padding: 40px 20px;
        }

        h2 {
            font-size: 4vh;
            margin-bottom: 10px;
            color: #bbbb10;
            text-transform: uppercase;
            text-align: center;
        }

        .explain {
            font-size: 2vh;
            font-family: serif;
            color: rgb(193, 170, 140);
            margin-bottom: 30px;
            text-align: center;
        }

        form {
            width: 100%;
            max-width: 400px; /* Bituma bidaba binini cyane kuri desktop */
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input {
            background-color: rgb(95, 95, 52);
            color: white;
            border: none;
            height: 50px;
            width: 100%;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        input::placeholder {
            color: #8fff73;
            opacity: 0.7;
        }

        .btnlog {
            background-color: #bbbb10;
            color: black;
            font-weight: bold;
            width: 100%;
            height: 50px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btnlog:hover {
            background-color: #e6e612;
            transform: scale(1.02);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.7;
            text-align: center;
        }

        .back {
            margin-top: 20px;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }

        /* --- IKI NI CYO GITUMA BIBA RESPONSIVE --- */
        @media (max-width: 768px) {
            section {
                flex-direction: column; /* Isunika byose munsi y'ibindi */
            }

            aside {
                width: 100%;
                height: 30vh; /* Igabanya ishusho kuri mobile */
            }

            .contain {
                width: 100%;
                height: auto;
                padding: 30px 15px;
            }

            .favour {
                font-size: 2.5vh;
            }

            h2 {
                font-size: 3vh;
            }
            
            input {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <section>
        <aside> 
            <p class="favour">
                Welcome Back! Please Enter Your Unique Student Credentials To
                Access Your Academic Dashboard.
            </p>
        </aside>

        <div class="contain">
            <h2>Student Portal Login</h2>
            <p class="explain">Enter Your Credentials To Access The Portal.</p>

            <form>
                <div>
                    <label>Full Name:</label>
                    <input type="text" class="info" placeholder="Enter your name" required>
                </div>

                <div>
                    <label>Student Code / ID:</label>
                    <input type="text" class="info" placeholder="Enter your code" required>
                </div>

                <div>
                    <label>Student Password:</label> 
                    <input type="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btnlog">LOGIN TO SYSTEM</button>
                
                <p class="footer-text">Forget Code? Contact the Registrar.</p>
            </form>

    <a href="../index.html" class="back" style="color: aliceblue;">Back to Home</a>
        </div>
    </section>

</body>
</html>
