<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARENT_login portal</title>
    <link rel="icon" href="LOGO.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-image:url(./shelby-murphy-figueroa-Psv8aHU9HN0-unsplash.jpg) ;
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position: center;
            text-align: center;
            justify-content: center;    
            overflow-x: hidden;
            min-height: 100vh;
        }
        .contain{
            background-color: rgba(26, 0, 51, 0.915);
            position: relative;
            border-radius: 5vh;
            box-shadow: 0 0 20px black;
            min-height: 100vh;
            padding: 20px;
        }
        aside{
            background-color: #010a13;
            height: 70vh;
            width: 45%;
            z-index: 5;
            clip-path: polygon(0 0, 100% 0, 150% 100%, 0 100%);  
            border: 5px solid rgb(0, 125, 125);
            filter: drop-shadow(0 0 15px rgb(14, 222, 222));
            color: azure;
        }
        .info{
            background:linear-gradient(45deg,#03303a,rgb(11, 53, 53),cyan) ;
            height: 70vh;
            width: 80vh;
            z-index: 5;
            clip-path: polygon(-0.1% 0%, 30% -150%,145% 100%, 100% 100%, 25% 100%);
            margin-left: -18%;
            border: 5px solid #00B4D8;
            filter: drop-shadow(0 0 15px rgb(14, 222, 222));
            padding-top: 2vh;
        }
        .display{
            width: 85%; 
            max-width: 120vh;
            height: 75vh;
            background-color: rgb(2, 49, 49);
            display: flex;
            margin: 10vh auto;
            justify-content: center;
            align-items: center;
            border-radius: 5vh;
            filter: drop-shadow(0 0 10px rgb(108, 108, 56));
        }
        .hold{ margin-top: 20vh; }
        input{
            width: 40vh;
            max-width: 80%; 
            height: 5vh;
            background-color: #1ab0cf;
            outline: none;
            border: none;
            font-size: 2vh;
            color: rgb(1, 57, 1);
            padding: 0 10px;
        }
        i{ margin-left:-4vh ; color: #013901; }
        button{
            background-color: #00B4D8;
            width: 30vh;
            height: 8vh;
            border-radius: 2vh;
            font-family: 'Times New Roman', Times, serif;
            border: 3px solid rgb(108, 105, 105);
            filter: drop-shadow(0 0 1.5vh rgb(250, 87, 87));
            font-size: 3vh;
            cursor: pointer;
        }
        label{ color: wheat; display: block; margin-bottom: 5px; }
        button:hover{ background-color:rgb(30, 210, 117); color: rgb(203, 8, 8); }
        .welcome{ font-family: serif; animation: clip 10s infinite; }
        @keyframes clip{
            0%{transform: rotateY(0deg);}
            50%{transform:rotateY(50deg)}
            100%{transform: rotatey(0deg);}
        }
        .log{ color: rgb(255, 187, 2); }
        .footer-text{ color: yellow; font-size: 14px; margin-top: 10px; }

        @media (max-width: 900px) {
            .display { flex-direction: column; height: auto; width: 95%; margin: 5vh auto; padding-bottom: 30px; }
            aside { width: 100%; height: auto; padding: 40px 20px; clip-path: none; border-radius: 5vh 5vh 0 0; }
            .info { width: 100%; height: auto; margin-left: 0; clip-path: none; padding: 30px 10px; border-radius: 0 0 5vh 5vh; }
            .hold { margin-top: 0; }
            input { width: 80%; margin-bottom: 10px; }
            i { display: none; }
        }
        .hom{
            color: #e5e5e5;
            text-decoration: none;
            font-weight: bold;
        }
        .hom:hover{
            color: #37ff00;
            text-decoration: none;
        }
        .back{
            text-decoration: none;
            color: #08d0f3;
            font-weight: bold;
        }
        .back:hover{
            color: #ff0000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    
<section>
    <div class="contain">
        <div class="display">
            <aside>
                <div class="hold">
                    <h3 class="welcome">WELCOME <br> BACK!</h3>
                    <p>we hope you and your family <br>have a nice day</p>
                </div>
            </aside>

            <div class="info">
                <h3 class="log">PARENT LOGIN PORTAL</h3>
                <br>
                <p style="color:white">Fill this field to access resources</p>
                <br>

                <label>Parent/Guardian Name:</label>
                <input type="text" placeholder="Enter your name">
                <i class="fas fa-user"></i>
                <br><br>      

                <label>Parent Phone:</label>
                <div>
                    <input type="text" placeholder="Enter your phone">
                    <i class="fas fa-phone"></i>
                </div>
                <br> 

                <label>Password:</label>
                <div>
                    <input type="password" placeholder="Enter password">
                    <i class="fas fa-lock"></i>
                </div>
                <br>
                <button type="button" onclick="goToDashboard()">SIGN IN</button>
                <br>
                <p class="footer-text">Forgot password? <a href="parent_signup.html" class="hom">Create an account</a></p>
                <p><a href="index.html" class="back">Back to Home</a></p>
            </div>
        </div>
    </div>
</section>

<script>
    function goToDashboard() {
        window.location.href = 'parent_darshboard.html';
    }
</script>

</body>
</html>
